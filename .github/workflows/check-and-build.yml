name: Check and Build
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  repository_dispatch:
    types: [ pr_created_by_automation ]

concurrency:
  # This group ID ensures that only one workflow runs per branch/PR at a time.
  # github.head_ref is only available in PRs, falling back to github.ref_name for pushes.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Run detekt & ktlintCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.client_payload.pull_request_head_ref || github.ref }}
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Run detekt with ktlint
        run: ./gradlew detekt ktlintCheck

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.client_payload.pull_request_head_ref || github.ref }}
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Test and Build
        run: ./gradlew build
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6